<!DOCTYPE html>
<html>
<head>
<style>
table, th, td {
  border:1px solid black;
  border-collapse: collapse;
  padding:8px;
}
</style>
</head>

<body>

<h1>Colspan and Rowspan</h1>

<h2>Cell that spans two columns:</h2>

<table>
<tr>
<th>Name</th>
<th>Email</th>
<th colspan="2">Phone</th>
</tr>

<tr>
<td>ABC</td>
<td>abc@example.com</td>
<td>123-45-678</td>
<td>212-00-546</td>
</tr>
</table>

<br>

<h2>Cell that spans two rows:</h2>

<table>
<tr>
<th>Name</th>
<td rowspan="2">ABC</td>
</tr>

<tr>
<th>Email</th>
</tr>

<tr>
<th>Phone</th>
<td>123-45-678</td>
</tr>
</table>

</body>
</html>
